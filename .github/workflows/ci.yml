name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          pnpm install --no-frozen-lockfile 2>&1 | tee pnpm-install.log

      - name: Check formatting
        shell: bash
        run: |
          set -o pipefail
          pnpm format:check 2>&1 | tee prettier-check.log

      - name: Upload bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-bootstrap
          path: |
            pnpm-install.log
            pnpm-lock.yaml
            prettier-check.log
          if-no-files-found: warn
          retention-days: 3

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
