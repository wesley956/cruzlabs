name: CI migration patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Rename conflicting constraint
        shell: bash
        run: |
          sed -i \
            's/constraint businesses_custom_profession_check/constraint businesses_profession_requirements_check/' \
            supabase/migrations/20260713000300_business_foundation.sql

      - name: Commit database fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/20260713000300_business_foundation.sql
          if git diff --cached --quiet; then
            echo "Constraint name already fixed"
          else
            git commit -m "fix business constraint name collision"
            git push origin HEAD:${{ github.head_ref }}
          fi
