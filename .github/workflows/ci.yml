name: CI availability engine diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format source
        run: pnpm format

      - name: Commit formatting
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps packages supabase docs
          if git diff --cached --quiet; then
            echo "No formatting changes"
          else
            git commit -m "format public availability sources"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Check formatting
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.84.2

      - name: Start local database and apply migrations
        shell: bash
        run: |
          set -o pipefail
          supabase db start 2>&1 | tee supabase-db-start.log

      - name: Run pgTAP database tests
        shell: bash
        run: |
          set -o pipefail
          supabase test db 2>&1 | tee supabase-test-db.log

      - name: Upload database diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: availability-database-diagnostics
          path: |
            supabase-db-start.log
            supabase-test-db.log
          if-no-files-found: warn
          retention-days: 3
