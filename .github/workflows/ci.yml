name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          pnpm install --no-frozen-lockfile 2>&1 | tee pnpm-install.log

      - name: Format source
        run: pnpm format

      - name: Archive formatted source
        shell: bash
        run: |
          git ls-files > formatted-files.txt
          printf '%s\n' pnpm-lock.yaml >> formatted-files.txt
          tar -czf formatted-source.tar.gz -T formatted-files.txt

      - name: Check formatting
        shell: bash
        run: |
          set -o pipefail
          pnpm format:check 2>&1 | tee prettier-check.log

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck.log

      - name: Build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee build.log

      - name: Upload bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-bootstrap
          path: |
            pnpm-install.log
            pnpm-lock.yaml
            prettier-check.log
            typecheck.log
            build.log
            formatted-source.tar.gz
          if-no-files-found: warn
          retention-days: 3

      - name: Verify quality results
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.typecheck.outcome }}" != "success" ]]; then
            echo "Typecheck failed"
            exit 1
          fi

          if [[ "${{ steps.build.outcome }}" != "success" ]]; then
            echo "Build failed"
            exit 1
          fi
